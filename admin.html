<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2027 일학습병행 상담예약 관리자</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-md mx-auto min-h-screen flex flex-col">
        <header class="p-5 bg-slate-800 border-b border-slate-700 sticky top-0 z-50 flex justify-between items-center">
            <h1 class="text-xl font-bold text-emerald-400">2027 일학습병행 상담신청자 관리</h1>
            <button onclick="fetchData()" class="text-slate-400 hover:text-emerald-400"><i class="fa-solid fa-rotate"></i></button>
        </header>

        <div class="p-4 bg-slate-800 shadow-lg">
            <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-wider">상담실 유형 필터</label>
            <select id="roomFilter" onchange="filterData()" class="w-full p-3 bg-slate-900 border border-slate-600 rounded-lg focus:outline-none focus:border-emerald-500">
                <option value="전체 보기">전체 보기</option>
                <option value="SW개발(고광용 교수님)">SW개발(고광용 교수님)</option>
                <option value="전자기기HW/디스플레이(김병천 교수님)">전자기기HW/디스플레이(김병천 교수님)</option>
                <option value="반도체장비개발(남기민 교수님)">반도체장비개발(남기민 교수님)</option>
                <option value="마케팅/광고홍보(강종천 교수님)">마케팅/광고홍보(강종천 교수님)</option>
            </select>
        </div>

        <main id="reservationList" class="flex-grow p-4 space-y-3 overflow-y-auto">
            <div class="text-center py-20 text-slate-500">데이터를 불러오는 중...</div>
        </main>
    </div>

    <div id="editModal" class="fixed inset-0 bg-black/80 z-[100] hidden items-start justify-center pt-10">
        <div class="bg-slate-800 w-full max-w-md rounded-b-3xl p-6 space-y-4 shadow-2xl border-b border-slate-700">
            <div class="flex justify-between items-center border-b border-slate-700 pb-3">
                <h2 class="text-lg font-bold">신청 상세 관리</h2>
                <button onclick="closeModal()" class="text-slate-400"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            
            <form id="editForm" class="space-y-4 text-sm">
                <input type="hidden" id="editId">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-slate-400 mb-1">성명</label>
                        <input type="text" id="editName" class="w-full p-2 bg-slate-900 border border-slate-600 rounded">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">상태</label>
                        <select id="editStatus" class="w-full p-2 bg-slate-900 border border-slate-600 rounded text-emerald-400 font-bold">
                            <option value="pending">승인 대기</option>
                            <option value="confirmed">확정 완료</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1">학과(전공)</label>
                    <input type="text" id="editDept" class="w-full p-2 bg-slate-900 border border-slate-600 rounded">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-slate-400 mb-1">희망일</label>
                        <input type="date" id="editDate" class="w-full p-2 bg-slate-900 border border-slate-600 rounded">
                    </div>
                    <div>
                        <label class="block text-slate-400 mb-1">시간</label>
                        <select id="editTime" class="w-full p-2 bg-slate-900 border border-slate-600 rounded">
                            <option value="09:30">09:30</option>
                            <option value="10:30">10:30</option>
                            <option value="13:20">13:20</option>
                            <option value="14:20">14:20</option>
                            <option value="15:20">15:20</option>
                            <option value="16:20">16:20</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-slate-400 mb-1">상담 내용</label>
                    <textarea id="editContent" rows="3" class="w-full p-2 bg-slate-900 border border-slate-600 rounded"></textarea>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="deleteReservation()" class="flex-1 bg-red-600 py-3 rounded-xl font-bold">삭제</button>
                    <button type="button" onclick="saveChanges()" class="flex-[2] bg-emerald-600 py-3 rounded-xl font-bold">승인 및 저장</button>
                </div>
            </form>
        </div>
    </div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxtnjRGzpdb_QB7IvCHc3DwLbpbcP8weKFBrQaFK4UhQu7rhWfN5AicdOVv6PT4RPYogg/exec"; // ⚠️ 본인의 구글 웹앱 URL 주소를 꼭 넣어주세요!
    let allData = [];

    async function fetchData() {
        try {
            const res = await fetch(API_URL);
            allData = await res.json();
            filterData();
        } catch (e) {
            document.getElementById('reservationList').innerHTML = `<div class="text-center text-red-400 py-20">데이터 연결 실패</div>`;
        }
    }

    // 필터링 로직 수정 (전체 보기 값 매칭)
    function filterData() {
        const filter = document.getElementById('roomFilter').value;
        const filtered = filter === "전체 보기" ? allData : allData.filter(d => d.room === filter);
        renderList(filtered);
    }

    function renderList(data) {
        const container = document.getElementById('reservationList');
        if (data.length === 0) {
            container.innerHTML = `<div class="text-center py-20 text-slate-500">예약 내역이 없습니다.</div>`;
            return;
        }
        container.innerHTML = data.map(item => `
            <div onclick="openEdit(${item.id})" class="p-4 bg-slate-800 border border-slate-700 rounded-2xl shadow-md active:scale-95 transition-transform">
                <div class="flex justify-between items-start mb-2">
                    <div>
                        <span class="text-xs font-bold text-emerald-400 bg-emerald-400/10 px-2 py-0.5 rounded">${item.room}</span>
                        <h3 class="text-lg font-bold mt-1">${item.name} <span class="text-xs font-normal text-slate-400">${item.dept}</span></h3>
                    </div>
                    <span class="text-xs ${item.status === 'confirmed' ? 'text-emerald-400' : 'text-amber-400'} font-bold">
                        ${item.status === 'confirmed' ? '확정' : '대기'}
                    </span>
                </div>
                <div class="flex justify-between text-xs text-slate-400">
                    <span><i class="fa-regular fa-calendar-check mr-1"></i> ${item.date}</span>
                    <span><i class="fa-regular fa-clock mr-1"></i> ${item.time}</span>
                </div>
            </div>
        `).join('');
    }

    function formatDateForInput(dateStr) {
        if (!dateStr) return "";
        try {
            let d = new Date(dateStr);
            if (isNaN(d.getTime())) {
                let cleaned = dateStr.replace(/\s/g, '').replace(/\./g, '-');
                if (cleaned.endsWith('-')) cleaned = cleaned.slice(0, -1);
                const parts = cleaned.split('-');
                if (parts.length === 3) {
                    return `${parts[0]}-${parts[1].padStart(2, '0')}-${parts[2].padStart(2, '0')}`;
                }
                return "";
            }
            return d.toISOString().split('T')[0];
        } catch (e) { return ""; }
    }

    function formatTimeForInput(timeStr) {
        if (!timeStr) return "09:30"; 
        
        let str = String(timeStr).trim();
        
        if (str.includes('1899') || str.includes('1900') || str.includes('T')) {
            try {
                if (str.includes('T')) {
                    const timeMatch = str.match(/T(\d{2}):(\d{2})/);
                    if (timeMatch) {
                        let hour = parseInt(timeMatch[1], 10);
                        let min = timeMatch[2];
                        
                        if (hour < 9) {
                            hour += 9;
                        }
                        if (hour >= 24) hour -= 24; 
                    }
                }
                
                const d = new Date(timeStr);
                if (!isNaN(d.getTime())) {
                    let hour = d.getHours();
                    let min = String(d.getMinutes()).padStart(2, '0');
                    
                    let minNum = parseInt(min, 10);
                    if (minNum >= 15 && minNum <= 45) {
                        min = "30";
                    } else {
                        if (minNum > 45) hour += 1;
                        min = "00";
                    }
                    
                    return `${String(hour).padStart(2, '0')}:${min}`;
                }
            } catch (e) {
                console.error("구글 시트 시간 보정 에러:", e);
            }
        }
        
        const isPM = str.includes('오후') || str.toUpperCase().includes('PM');
        const isAM = str.includes('오전') || str.toUpperCase().includes('AM');
        
        if (isPM || isAM) {
            let cleanTime = str.replace(/오전|오후|AM|PM/gi, '').trim();
            const parts = cleanTime.split(':');
            if (parts.length >= 2) {
                let hour = parseInt(parts[0], 10);
                let min = parts[1].replace(/[^0-9]/g, '').padStart(2, '0');
                if (isPM && hour < 12) hour += 12;
                if (isAM && hour === 12) hour = 0;
                return `${String(hour).padStart(2, '0')}:${min}`;
            }
        }
        
        const parts = str.split(':');
        if (parts.length >= 2) {
            let hour = parts[0].replace(/[^0-9]/g, '').padStart(2, '0');
            let min = parts[1].replace(/[^0-9]/g, '').padStart(2, '0');
            return `${hour}:${min}`;
        }
        
        return "09:30"; 
    }

    function openEdit(id) {
        const item = allData.find(d => d.id === id);
        if (!item) return;

        document.getElementById('editId').value = item.id;
        document.getElementById('editName').value = item.name;
        document.getElementById('editStatus').value = item.status;
        document.getElementById('editDept').value = item.dept;
        document.getElementById('editContent').value = item.content;
        
        document.getElementById('editDate').value = formatDateForInput(item.date);
        document.getElementById('editTime').value = formatTimeForInput(item.time);
        
        document.getElementById('editModal').classList.remove('hidden');
        document.getElementById('editModal').classList.add('flex');
    }

    function closeModal() {
        document.getElementById('editModal').classList.add('hidden');
        document.getElementById('editModal').classList.remove('flex');
    }

    async function saveChanges() {
        const id = document.getElementById('editId').value;
        const updated = {
            id: Number(id),
            action: "save",
            name: document.getElementById('editName').value,
            status: document.getElementById('editStatus').value,
            dept: document.getElementById('editDept').value,
            date: document.getElementById('editDate').value,
            time: document.getElementById('editTime').value,
            content: document.getElementById('editContent').value,
            room: allData.find(d => d.id === Number(id)).room
        };
        await sendPost(updated);
    }

    async function deleteReservation() {
        if (!confirm("정말 삭제하시겠습니까?")) return;
        const id = document.getElementById('editId').value;
        await sendPost({ id: Number(id), action: "delete" });
    }

    async function sendPost(data) {
        document.getElementById('editModal').classList.add('opacity-50', 'pointer-events-none');
        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(data)
            });
            alert("반영되었습니다.");
            closeModal();
            fetchData();
        } catch (e) {
            alert("처리 실패");
        } finally {
            document.getElementById('editModal').classList.remove('opacity-50', 'pointer-events-none');
        }
    }

    window.onload = fetchData;
</script>
</body>
</html>
